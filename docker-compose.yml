services:
  chainlit-ui:
    build: .
    container_name: hr-chatui
    ports:
      - "8089:8080"
    env_file: .env
    environment:
      - CHAINLIT_URL=http://localhost:8089
      - MCP_URL=${MCP_URL}
      - CHAINLIT_AUTH_SECRET=changeme_random_secret_123
      - CHAINLIT_TELEMETRY=false
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - GEMINI_DISABLED_MODELS=${GEMINI_DISABLED_MODELS:-}
      - LITERAL_API_KEY=
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  dev-network:
    external: true
